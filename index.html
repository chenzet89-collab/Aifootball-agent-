<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>System_v26.4 Dashboard</title>
    <style>
        :root {
            --bg-color: #000;
            --glass-bg: rgba(28, 28, 30, 0.5);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent-color: #00ff88;
            --text-secondary: rgba(255, 255, 255, 0.45);
        }

        body {
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e, #000);
            color: #fff;
            font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-pane {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            margin-top: 20px;
            height: fit-content;
        }

        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .lang-select { background: rgba(255, 255, 255, 0.08); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-secondary); font-size: 11px; padding: 6px 10px; outline: none; }

        .header { display: flex; align-items: center; }
        .status-dot { height: 6px; width: 6px; background: var(--accent-color); border-radius: 50%; margin-right: 10px; box-shadow: 0 0 10px var(--accent-color); }
        h2 { font-size: 11px; font-weight: 600; letter-spacing: 1px; color: var(--text-secondary); margin: 0; text-transform: uppercase; }

        .form-segment { margin-bottom: 24px; }
        label { display: block; font-size: 10px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; letter-spacing: 1.2px; }

        input, select {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: #fff;
            width: 100%;
            padding: 14px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus, select:focus { border-color: var(--accent-color); background: rgba(255, 255, 255, 0.08); }

        button {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 16px;
            padding: 18px;
            width: 100%;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:active { background: var(--accent-color); color: #000; transform: scale(0.96); }

        #planResult { margin-top: 28px; border-top: 1px solid var(--glass-border); padding-top: 24px; }
        #planContent { white-space: pre-wrap; font-size: 14px; line-height: 1.7; color: rgba(255, 255, 255, 0.9); }

        .hidden { display: none !important; }
        #loadingStatus { display: flex; align-items: center; color: var(--accent-color); font-size: 11px; }
        .spinner { height: 12px; width: 12px; border: 2px solid rgba(0, 255, 136, 0.1); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="glass-pane">
    <div class="top-nav">
        <select id="language" class="lang-select" onchange="switchLanguage()">
            <option value="zh">中文</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
        </select>
        <div class="header">
            <span class="status-dot"></span>
            <h2 id="ui-version">System_v26.4</h2>
        </div>
    </div>

    <div class="form-segment">
        <label data-i18n="label_age">BIO_AGE</label>
        <input type="number" id="age" placeholder="20">
    </div>

    <div class="form-segment">
        <label data-i18n="label_level">PERFORMANCE_LEVEL</label>
        <select id="level"></select>
    </div>

    <div class="form-segment">
        <label data-i18n="label_role">FIELD_ROLE_MATRIX</label>
        <select id="position"></select>
    </div>

    <div class="form-segment">
        <label data-i18n="label_status">TODAY_BIO_STATUS</label>
        <input type="text" id="biostatus" data-i18n-placeholder="status_placeholder">
    </div>

    <button onclick="generatePlan()" data-i18n="btn_init">Initialize_Protocol</button>
    
    <div id="planResult">
        <div id="loadingStatus" class="hidden">
            <div class="spinner"></div>
            <span data-i18n="loading_text">ANALYZING_DATA...</span>
        </div>
        <p id="planContent" data-i18n="pending_text">Protocol_Pending...</p>
    </div>
</div>

<script>
const i18n = {
    zh: {
        label_age: "生理年龄 (BIO_AGE)",
        label_level: "竞技等级 (LEVEL)",
        label_role: "球场角色 (ROLE_MATRIX)",
        label_status: "今日状态 (BIO_STATUS)",
        status_placeholder: "疲劳、伤病或目标...",
        btn_init: "初始化训练协议",
        loading_text: "正在分析战术数据...",
        pending_text: "等待协议初始化...",
        levels: ["普通爱好者", "校队/半职业", "精英/职业"],
        roles: {
            "DEF": ["清道夫门将", "出球后卫", "内收型边后卫"],
            "MID": ["深位组织者", "全能中场", "前场指挥官"],
            "WING": ["爆破型边锋", "内切型边锋", "边路组织者"],
            "FWD": ["全能前锋", "伪九号", "抢点前锋"]
        }
    },
    en: {
        label_age: "BIO_AGE",
        label_level: "PERFORMANCE_LEVEL",
        label_role: "FIELD_ROLE_MATRIX",
        label_status: "TODAY_BIO_STATUS",
        status_placeholder: "Fatigue, injury or goals...",
        btn_init: "Initialize_Protocol",
        loading_text: "ANALYZING_DATA...",
        pending_text: "Protocol_Pending...",
        levels: ["Casual Enthusiast", "Varsity Athlete", "Elite Professional"],
        roles: {
            "DEF": ["Sweeper Keeper", "Ball Playing CB", "Inverted FB"],
            "MID": ["Deep Lying PM", "Box to Box", "Advanced PM"],
            "WING": ["Explosive Winger", "Inverted Winger", "Wide Playmaker"],
            "FWD": ["Complete Forward", "False Nine", "Poacher"]
        }
    },
    es: {
        label_age: "EDAD_BIO",
        label_level: "NIVEL_RENDIMIENTO",
        label_role: "MATRIZ_DE_ROL",
        label_status: "ESTADO_BIO_HOY",
        status_placeholder: "Fatiga, lesión o metas...",
        btn_init: "Iniciar_Protocolo",
        loading_text: "ANALIZANDO_DATOS...",
        pending_text: "Protocolo_Pendiente...",
        levels: ["Entusiasta Casual", "Atleta Universitario", "Elite Profesional"],
        roles: {
            "DEF": ["Portero Cierre", "Central de Salida", "Lateral Invertido"],
            "MID": ["Organizador Profundo", "Todocampista", "Organizador Avanzado"],
            "WING": ["Extremo Puro", "Extremo Invertido", "Organizador de Banda"],
            "FWD": ["Delantero Completo", "Falso Nueve", "Cazagoles"]
        }
    },
    ja: {
        label_age: "生理的年齢 (AGE)",
        label_level: "競技レベル (LEVEL)",
        label_role: "役割マトリックス (ROLE)",
        label_status: "今日の状態 (STATUS)",
        status_placeholder: "疲労、怪我、または目標...",
        btn_init: "トレーニング開始",
        loading_text: "データを分析中...",
        pending_text: "待機中...",
        levels: ["アマチュア", "代表/セミプロ", "プロフェッショナル"],
        roles: {
            "DEF": ["スイーパーGK", "ボールキャリーCB", "偽サイドバック"],
            "MID": ["司令塔 (DLP)", "中盤のダイナ모", "トップ下"],
            "WING": ["純粋なウイング", "インバーテッド", "ワイドPM"],
            "FWD": ["コンプリートFW", "偽9番", "ストライカー"]
        }
    },
    ko: {
        label_age: "생리학적 연령 (AGE)",
        label_level: "경기 수준 (LEVEL)",
        label_role: "포지션 역할 (ROLE)",
        label_status: "현재 상태 (STATUS)",
        status_placeholder: "피로도, 부상 또는 목표...",
        btn_init: "훈련 프로토콜 시작",
        loading_text: "데이터 분석 중...",
        pending_text: "초기화 대기 중...",
        levels: ["일반 동호인", "대학부/세미프로", "엘리트 프로"],
        roles: {
            "DEF": ["스위퍼 키퍼", "볼 플레잉 CB", "인버티드 풀백"],
            "MID": ["딥라잉 PM", "박스 투 박스", "어드밴스드 PM"],
            "WING": ["클래식 윙어", "인버티드 윙어", "와이드 PM"],
            "FWD": ["컴플리트 포워드", "펄스 나인", "포처"]
        }
    }
};

function switchLanguage() {
    const lang = document.getElementById('language').value;
    const data = i18n[lang] || i18n.en;

    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (data[key]) el.innerText = data[key];
    });

    const statusInput = document.getElementById('biostatus');
    statusInput.placeholder = data.status_placeholder;

    const levelSelect = document.getElementById('level');
    levelSelect.innerHTML = "";
    const levelValues = ["Casual_Enthusiast", "Varsity_Athlete", "Elite_Professional"];
    data.levels.forEach((text, i) => {
        levelSelect.options.add(new Option(text, levelValues[i]));
    });

    const roleSelect = document.getElementById('position');
    roleSelect.innerHTML = "";
    for (const [group, items] of Object.entries(data.roles)) {
        const optgroup = document.createElement('optgroup');
        optgroup.label = group;
        items.forEach(text => {
            const val = text.replace(/\s+/g, '_');
            optgroup.appendChild(new Option(text, val));
        });
        roleSelect.appendChild(optgroup);
    }
}

async function generatePlan() {
    const age = document.getElementById('age').value;
    const pos = document.getElementById('position').value;
    const level = document.getElementById('level').value;
    const lang = document.getElementById('language').value;
    const bioStatus = document.getElementById('biostatus').value;
    const contentP = document.getElementById('planContent');
    const loadingS = document.getElementById('loadingStatus');

    if (!age) { alert("ERROR: BIO_AGE_REQUIRED"); return; }

    contentP.innerText = "";
    loadingS.classList.remove('hidden');

    const MY_KEY = "sk-9ead6695bcc448a8a371ca62bce3b2a2"; 
    const aiLangMap = { zh: "Chinese", en: "English", es: "Spanish", ja: "Japanese", ko: "Korean" };

    try {
        const response = await fetch("https://api.deepseek.com/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${MY_KEY}` },
            body: JSON.stringify({
                model: "deepseek-chat",
                messages: [
                    { 
                        role: "system", 
                        content: `Elite Football Tactical AI. Output language: ${aiLangMap[lang]}. Tone: Cold, professional, data-driven.` 
                    },
                    { 
                        role: "user", 
                        content: `Protocol Request: Level:${level}, Role:${pos}, Age:${age}, Status:${bioStatus}. Provide warm-up, technical, and physical blocks.` 
                    }
                ]
            })
        });
        const result = await response.json();
        loadingS.classList.add('hidden');
        contentP.innerText = result.choices[0].message.content;
    } catch (e) {
        loadingS.classList.add('hidden');
        contentP.innerText = "NETWORK_ERROR: CHECK_API_KEY_OR_CONNECTION";
    }
}

// 初始化加载语言
window.onload = switchLanguage;
</script>

</body>
</html>
